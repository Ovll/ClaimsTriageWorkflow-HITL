services:
  triage:
    build: .
    # stdin_open + tty are required: the HITL adjuster_gate pauses the workflow
    # and reads a decision from the operator via Console.ReadLine().
    stdin_open: true
    tty: true
    env_file:
      - .env
    # Allows the container to reach Ollama running on the host.
    # On Linux, host.docker.internal is not available by default; this adds it.
    extra_hosts:
      - "host.docker.internal:host-gateway"
